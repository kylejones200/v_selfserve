# Deploy the built frontend to GitHub Pages.
# The API server must be hosted elsewhere; set VITE_API_URL when building.
#
# 1. In repo Settings → Pages → Source: choose "GitHub Actions".
# 2. Add repository variables (Settings → Secrets and variables → Actions):
#    - VITE_API_URL (e.g. https://your-api.fly.dev)
#    - VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID (from Firebase)
#    - Optional: BASE_PATH for project pages (e.g. /v_selfserve/)
# 3. Firebase Console: add your GitHub Pages domain to Authorized domains.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency: group:pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          BASE_PATH: ${{ vars.BASE_PATH }}
        run: |
          BASE_PATH="${BASE_PATH:-/v_selfserve/}"
          npm run build -- --base "$BASE_PATH"

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
